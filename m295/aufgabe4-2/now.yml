info:
  name: Get current time (now)
  type: http
  seq: 1

http:
  method: GET
  url: http://localhost:3000/now?tz=Europe/Zurich
  params:
    - name: tz
      value: Europe/Zurich
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
